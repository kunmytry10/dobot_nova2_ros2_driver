/**:
  ros__parameters:
    robot_ip: "192.168.5.1"
    dashboard_port: 29999
    move_port: 30003
    feedback_port: 30004

    # Default coordinate indexes. TCP/tool defaults to 0.
    default_user: 0
    default_tool: 0

    # 0 means the command omits that option and uses the controller default.
    default_speed_j: 0
    default_acc_j: 0
    default_speed_l: 0
    default_acc_l: 0

    connect_on_start: true
    enable_on_start: false
    wait_for_motion: false
    motion_status_check: true
    post_motion_check: true
    post_motion_check_timeout_sec: 2.0
    joint_arrival_tolerance_deg: 0.5
    tcp_position_tolerance_mm: 1.0
    tcp_rotation_tolerance_deg: 1.0
    command_timeout_sec: 3.0
    motion_timeout_sec: 30.0

    ik_check: true
    ik_use_joint_near: true

    feedback_rate_hz: 20.0
    joint_names: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6"]
